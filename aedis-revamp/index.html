  <!--
    Defense-in-depth headers (AEDIS-pre-demo-audit / HIPAA §164.312(e)(1)).
    CSP is delivered as a <meta http-equiv> tag because GitHub Pages will
    not let us set response headers; production-on-Bedrock should add the
